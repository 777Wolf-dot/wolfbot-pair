<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Pair Code | Silent Wolf</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        color: #00ff99;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 0 0 15px #00ff88;
      }

      .form-box {
        background: rgba(0, 255, 0, 0.08);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(0, 255, 0, 0.25);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 90%;
        max-width: 380px;
        margin-bottom: 15px;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 2px solid #00ff00;
        background: transparent;
        color: #00ff00;
        outline: none;
        font-size: 1rem;
        margin-bottom: 15px;
        text-align: center;
        transition: 0.3s;
      }

      input:focus {
        box-shadow: 0 0 10px #00ff00;
      }

      .btn {
        padding: 10px 25px;
        border: 2px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        width: 100%;
      }

      .btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 25px #00ff00;
      }

      #paircode-box {
        margin-top: 20px;
        padding: 10px;
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid #00ff00;
        border-radius: 8px;
        min-height: 50px;
        width: 100%;
        text-align: center;
        font-size: 1.2rem;
        letter-spacing: 2px;
        color: #00ff88;
        word-break: break-word;
      }

      .copy-btn {
        margin-top: 10px;
        padding: 8px 20px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        cursor: pointer;
        transition: 0.3s;
      }

      .copy-btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 15px #00ff00;
      }

      .back-btn {
        margin-top: 15px;
        padding: 8px 20px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        color: #00ff00;
        text-decoration: none;
        transition: 0.3s;
        font-size: 0.9rem;
      }

      .back-btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 15px #00ff00;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      .status-info {
        margin-top: 10px;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.6rem;
        }

        input {
          font-size: 0.9rem;
        }

        #paircode-box {
          font-size: 1rem;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.3rem;
        }

        .btn,
        .copy-btn,
        .back-btn {
          font-size: 0.85rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="background"></canvas>
    <h1>Pair with Code</h1>

    <div class="form-box">
      <input type="text" id="phoneNumber" placeholder="Enter your phone number" />
      <button class="btn" onclick="generatePairCode()">⚡ Generate Pair Code</button>

      <div id="paircode-box">Your code will appear here</div>
      <div id="status-info" class="status-info"></div>
      <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
    </div>

    <a href="index.html" class="back-btn">⬅ Back to Home</a>

    <script>
      // 🎇 Background animation
      const canvas = document.getElementById('background');
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const particles = Array.from({ length: 100 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        dx: (Math.random() - 0.5) * 1,
        dy: (Math.random() - 0.5) * 1,
      }));

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff00';
        particles.forEach((p) => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();

      // ⚙️ Generate Pair Code
      async function generatePairCode() {
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const box = document.getElementById('paircode-box');
        const statusInfo = document.getElementById('status-info');

        if (!phoneNumber) {
          box.textContent = '⚠️ Please enter a phone number first.';
          box.style.color = 'red';
          statusInfo.textContent = '';
          return;
        }

        // Set loading state
        box.textContent = '⏳ Generating code...';
        box.style.color = '#00ff00';
        statusInfo.textContent = '';
        
        // Disable button during generation
        const button = document.querySelector('.btn');
        const originalText = button.innerHTML;
        button.innerHTML = '⏳ Generating...';
        button.disabled = true;

        try {
         // Old: const res = await fetch('https://wolfbot-pair-1.onrender.com/generate-paircode', {
const res = await fetch('http://localhost:5000/generate-paircode',{
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number: phoneNumber })
          });
          
          const data = await res.json();

          if (data.code) {
            box.textContent = data.code;
            box.style.color = '#00ff88';
            statusInfo.textContent = `✅ Code generated! Expires in ${data.expiresIn}`;
          } else if (data.status === 'connected') {
            box.textContent = '✅ WhatsApp is already connected!';
            box.style.color = '#00ff88';
            statusInfo.textContent = 'No need to generate a new code.';
          } else if (data.error) {
            box.textContent = `❌ ${data.error}`;
            box.style.color = 'red';
            statusInfo.textContent = '';
          } else {
            box.textContent = '❌ Failed to generate code';
            box.style.color = 'red';
            statusInfo.textContent = '';
          }
        } catch (err) {
          console.error(err);
          box.textContent = '❌ Error connecting to server.';
          box.style.color = 'red';
          statusInfo.textContent = 'Make sure the backend server is running on port 5000.';
        } finally {
          // Re-enable button
          button.innerHTML = originalText;
          button.disabled = false;
        }
      }

      // 📋 Copy Code
      function copyCode() {
        const text = document.getElementById('paircode-box').textContent.trim();
        const box = document.getElementById('paircode-box');
        
        if (!text || text.includes('Your code') || text.includes('Please enter') || 
            text.includes('Generating') || text.includes('Error') || 
            text.includes('Failed') || text.includes('WhatsApp is already')) {
          return;
        }
        
        navigator.clipboard.writeText(text).then(() => {
          const originalColor = box.style.color;
          box.style.color = '#ffff00';
          box.textContent = '✅ Copied to clipboard!';
          
          setTimeout(() => {
            box.textContent = text;
            box.style.color = originalColor;
          }, 2000);
        }).catch(err => {
          console.error('Failed to copy: ', err);
          alert('❌ Failed to copy code to clipboard');
        });
      }

      // Check if server is running on page load
      window.addEventListener('load', async () => {
        try {
          const response = await fetch('http://localhost:5000/status');
          const status = await response.json();
          if (status.connected) {
            document.getElementById('paircode-box').textContent = '✅ WhatsApp is already connected!';
            document.getElementById('paircode-box').style.color = '#00ff88';
          }
        } catch (error) {
          console.log('Server status check failed - make sure backend is running');
        }
      });
    </script>
  </body>
</html>
