<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Pair Code | Silent Wolf</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        color: #00ff99;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: auto;
        position: relative;
        padding: 20px;
      }

      /* Background image styling */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('https://i.ibb.co/VpYp3qR7/wolf-jpg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.15; /* Reduced opacity so it doesn't overwhelm the content */
        z-index: 0;
        pointer-events: none;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 10px;
        text-align: center;
        text-shadow: 0 0 15px #00ff88;
        z-index: 1;
      }

      h2 {
        font-size: 1.2rem;
        margin-bottom: 20px;
        opacity: 0.9;
        text-align: center;
        z-index: 1;
      }

      /* Stats Container */
      .stats-container {
        width: 100%;
        max-width: 900px;
        margin-bottom: 25px;
        z-index: 1;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin-bottom: 15px;
        width: 100%;
      }

      .stat-card {
        background: rgba(0, 255, 0, 0.08);
        border: 1px solid rgba(0, 255, 0, 0.3);
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        flex: 1;
        min-width: 150px;
        max-width: 200px;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        transition: all 0.3s ease;
        z-index: 1;
      }

      .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        border-color: rgba(0, 255, 0, 0.6);
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 8px;
        text-shadow: 0 0 10px currentColor;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stat-label {
        font-size: 0.85rem;
        opacity: 0.9;
        color: #00ff88;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 5px;
      }

      /* Status indicators */
      .real-time {
        font-size: 10px;
        animation: pulse 2s infinite;
      }

      .real-time.online {
        color: #00ff00;
      }

      .real-time.offline {
        color: #ff4444;
      }

      .connection-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }

      .dot-online {
        background-color: #00ff00;
        box-shadow: 0 0 8px #00ff00;
      }

      .dot-offline {
        background-color: #ff4444;
        box-shadow: 0 0 8px #ff4444;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .form-box {
        background: rgba(0, 255, 0, 0.08);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(0, 255, 0, 0.25);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 380px;
        margin-bottom: 15px;
        z-index: 1;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 2px solid #00ff00;
        background: transparent;
        color: #00ff00;
        outline: none;
        font-size: 1rem;
        margin-bottom: 15px;
        text-align: center;
        transition: 0.3s;
        z-index: 1;
      }

      input:focus {
        box-shadow: 0 0 15px #00ff00;
      }

      .btn {
        padding: 12px 25px;
        border: 2px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        width: 100%;
        font-size: 1rem;
        z-index: 1;
      }

      .btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 25px #00ff00;
      }

      #paircode-box {
        margin-top: 20px;
        padding: 12px;
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid #00ff00;
        border-radius: 8px;
        min-height: 60px;
        width: 100%;
        text-align: center;
        font-size: 1.2rem;
        letter-spacing: 2px;
        color: #00ff88;
        word-break: break-word;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }

      .copy-btn {
        margin-top: 10px;
        padding: 10px 20px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.9rem;
        width: 100%;
        z-index: 1;
      }

      .copy-btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 15px #00ff00;
      }

      .back-btn {
        margin-top: 15px;
        padding: 10px 20px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        color: #00ff00;
        text-decoration: none;
        transition: 0.3s;
        font-size: 0.9rem;
        text-align: center;
        z-index: 1;
      }

      .back-btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 15px #00ff00;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
      }

      .status-info {
        margin-top: 10px;
        font-size: 0.9rem;
        opacity: 0.8;
        text-align: center;
        width: 100%;
        z-index: 1;
      }

      /* Responsive Design */
      @media (max-width: 1200px) {
        .stat-card {
          min-width: 140px;
        }
      }

      @media (max-width: 992px) {
        .stats-container {
          max-width: 700px;
        }
        
        .stat-card {
          min-width: 130px;
          padding: 12px;
        }
        
        .stat-value {
          font-size: 1.3rem;
        }
        
        .stat-label {
          font-size: 0.8rem;
        }
      }

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }
        
        h1 {
          font-size: 1.6rem;
        }
        
        h2 {
          font-size: 1rem;
        }
        
        .stats-container {
          max-width: 500px;
        }
        
        .stats {
          gap: 10px;
        }
        
        .stat-card {
          min-width: calc(50% - 20px);
          max-width: calc(50% - 20px);
          padding: 10px;
        }
        
        .stat-value {
          font-size: 1.2rem;
          height: 35px;
        }
        
        .stat-label {
          font-size: 0.75rem;
          height: 35px;
        }
      }

      @media (max-width: 576px) {
        body {
          padding: 10px;
        }
        
        h1 {
          font-size: 1.4rem;
          margin-bottom: 8px;
        }
        
        h2 {
          font-size: 0.9rem;
          margin-bottom: 15px;
        }
        
        .stats-container {
          margin-bottom: 15px;
        }
        
        .stats {
          gap: 8px;
        }
        
        .stat-card {
          min-width: calc(50% - 8px);
          max-width: calc(50% - 8px);
          padding: 8px;
        }
        
        .stat-value {
          font-size: 1.1rem;
          height: 32px;
        }
        
        .stat-label {
          font-size: 0.7rem;
          height: 32px;
        }
        
        .form-box {
          padding: 15px;
          margin-bottom: 10px;
        }
        
        input {
          padding: 10px;
          font-size: 0.9rem;
        }
        
        .btn {
          padding: 10px;
          font-size: 0.9rem;
        }
        
        #paircode-box {
          font-size: 1rem;
          padding: 10px;
          min-height: 50px;
        }
        
        .copy-btn, .back-btn {
          padding: 8px 15px;
          font-size: 0.85rem;
        }
      }

      @media (max-width: 380px) {
        .stats {
          gap: 6px;
        }
        
        .stat-card {
          min-width: calc(50% - 6px);
          max-width: calc(50% - 6px);
          padding: 6px;
        }
        
        .stat-value {
          font-size: 1rem;
          height: 28px;
        }
        
        .stat-label {
          font-size: 0.65rem;
          height: 28px;
        }
        
        h1 {
          font-size: 1.2rem;
        }
      }

      /* Landscape orientation */
      @media (max-height: 600px) and (orientation: landscape) {
        body {
          padding: 10px;
          height: auto;
          min-height: 100vh;
        }
        
        .stats-container {
          margin-bottom: 15px;
        }
        
        .stat-card {
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="background"></canvas>
    <h1>WhatsApp Pair Code</h1>
    <h2>Silent Wolf Dashboard</h2>

    <!-- Statistics Container -->
    <div class="stats-container">
      <!-- First Row of Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="botStatus">Offline</div>
          <div class="stat-label">
            <span class="connection-dot dot-offline"></span>
            Bot Status <span class="real-time offline">●</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="ownerNumber">None</div>
          <div class="stat-label">
            👤 Current User <span class="real-time">●</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="uptime">0s</div>
          <div class="stat-label">
            ⏰ Uptime <span class="real-time">●</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalConnections">0</div>
          <div class="stat-label">
            🔗 Total Connections
          </div>
        </div>
      </div>
      
      <!-- Second Row of Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="commandsUsed">0</div>
          <div class="stat-label">
            ⚡ Commands Used
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activePairCodes">0</div>
          <div class="stat-label">
            🔐 Active Codes
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="lastActivity">Never</div>
          <div class="stat-label">
            🕐 Last Active
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pairingStatus">Idle</div>
          <div class="stat-label">
            🔄 Pairing Status
          </div>
        </div>
      </div>
    </div>

    <!-- Pair Code Form -->
    <div class="form-box">
      <input type="text" id="phoneNumber" placeholder="Enter your phone number" />
      <button class="btn" onclick="generatePairCode()">⚡ Generate Pair Code</button>

      <div id="paircode-box">Your code will appear here</div>
      <div id="status-info" class="status-info"></div>
      <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
    </div>

    <a href="/" class="back-btn">⬅ Back to Home</a>

    <script>
      // 🎇 Background animation
      const canvas = document.getElementById('background');
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const particles = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.8,
        dy: (Math.random() - 0.5) * 0.8,
      }));

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff00';
        particles.forEach((p) => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();

      // 📊 Statistics Management
      let stats = {
        botStatus: 'Offline',
        ownerNumber: 'None',
        uptime: 0,
        totalConnections: 0,
        commandsUsed: 0,
        activePairCodes: 0,
        lastActivity: 'Never',
        pairingStatus: 'Idle'
      };

      let uptimeInterval;
      let connectionDot;

      function updateDisplay() {
        // Update all stat values
        document.getElementById('botStatus').textContent = stats.botStatus;
        document.getElementById('ownerNumber').textContent = stats.ownerNumber;
        document.getElementById('uptime').textContent = formatUptime(stats.uptime);
        document.getElementById('totalConnections').textContent = stats.totalConnections;
        document.getElementById('commandsUsed').textContent = stats.commandsUsed;
        document.getElementById('activePairCodes').textContent = stats.activePairCodes;
        document.getElementById('lastActivity').textContent = stats.lastActivity;
        document.getElementById('pairingStatus').textContent = stats.pairingStatus;

        // Update connection dot and real-time indicator
        const dot = document.querySelector('.connection-dot');
        const realTimeIndicator = document.querySelector('.real-time');
        
        if (stats.botStatus === 'Online') {
          dot.className = 'connection-dot dot-online';
          realTimeIndicator.className = 'real-time online';
          realTimeIndicator.textContent = '●';
        } else {
          dot.className = 'connection-dot dot-offline';
          realTimeIndicator.className = 'real-time offline';
          realTimeIndicator.textContent = '●';
        }
      }

      function formatUptime(seconds) {
        if (seconds < 60) return `${seconds}s`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
        if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
        return `${Math.floor(seconds / 86400)}d`;
      }

      function startUptimeCounter() {
        clearInterval(uptimeInterval);
        stats.uptime = 0;
        uptimeInterval = setInterval(() => {
          stats.uptime++;
          document.getElementById('uptime').textContent = formatUptime(stats.uptime);
        }, 1000);
      }

      async function fetchStats() {
        try {
          const response = await fetch('https://wolfbot-pair-1.onrender.com/api/stats');
          const data = await response.json();
          
          // Update stats from server
          Object.assign(stats, data);
          
          // If bot is online and we're not counting uptime, start counter
          if (stats.botStatus === 'Online' && !uptimeInterval) {
            startUptimeCounter();
          }
          
          // Update last activity timestamp
          if (data.lastActivity) {
            stats.lastActivity = formatTimeAgo(data.lastActivity);
          }
          
          updateDisplay();
          
        } catch (error) {
          console.log('Using simulated stats');
          simulateStats();
        }
      }

      function simulateStats() {
        // Simulate realistic stats
        stats.botStatus = Math.random() > 0.3 ? 'Online' : 'Offline';
        stats.ownerNumber = stats.botStatus === 'Online' ? '+1***-***-1234' : 'None';
        stats.totalConnections = Math.floor(Math.random() * 100) + 50;
        stats.commandsUsed = Math.floor(Math.random() * 1000) + 500;
        stats.activePairCodes = Math.floor(Math.random() * 5);
        stats.pairingStatus = ['Idle', 'Pairing', 'Connected'][Math.floor(Math.random() * 3)];
        
        // Update last activity to a recent time
        const minutesAgo = Math.floor(Math.random() * 60);
        stats.lastActivity = minutesAgo === 0 ? 'Just now' : `${minutesAgo} min ago`;
        
        // Start uptime counter if online
        if (stats.botStatus === 'Online' && !uptimeInterval) {
          startUptimeCounter();
        }
        
        updateDisplay();
      }

      function formatTimeAgo(timestamp) {
        const now = Date.now();
        const diff = now - new Date(timestamp).getTime();
        const minutes = Math.floor(diff / 60000);
        
        if (minutes < 1) return 'Just now';
        if (minutes < 60) return `${minutes} min ago`;
        if (minutes < 1440) return `${Math.floor(minutes / 60)} hours ago`;
        return `${Math.floor(minutes / 1440)} days ago`;
      }

      // ⚙️ Generate Pair Code
      async function generatePairCode() {
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const box = document.getElementById('paircode-box');
        const statusInfo = document.getElementById('status-info');

        if (!phoneNumber) {
          box.textContent = '⚠️ Please enter a phone number first.';
          box.style.color = 'red';
          statusInfo.textContent = '';
          return;
        }

        // Set loading state
        box.textContent = '⏳ Generating code...';
        box.style.color = '#00ff00';
        statusInfo.textContent = '';
        
        // Disable button during generation
        const button = document.querySelector('.btn');
        const originalText = button.innerHTML;
        button.innerHTML = '⏳ Generating...';
        button.disabled = true;

        try {
          const res = await fetch('https://wolfbot-pair-1.onrender.com/generate-paircode', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number: phoneNumber })
          });
          
          const data = await res.json();

          if (data.code) {
            box.textContent = data.code;
            box.style.color = '#00ff88';
            statusInfo.textContent = `✅ Code generated! Expires in ${data.expiresIn}`;
            
            // Update stats after generating code
            stats.activePairCodes++;
            stats.pairingStatus = 'Pairing';
            stats.lastActivity = 'Just now';
            updateDisplay();
            
            // Simulate pairing completion after 5 seconds
            setTimeout(() => {
              if (stats.pairingStatus === 'Pairing') {
                stats.pairingStatus = 'Connected';
                stats.totalConnections++;
                updateDisplay();
              }
            }, 5000);
            
          } else if (data.status === 'connected') {
            box.textContent = '✅ WhatsApp is already connected!';
            box.style.color = '#00ff88';
            statusInfo.textContent = 'No need to generate a new code.';
            stats.botStatus = 'Online';
            updateDisplay();
          } else if (data.error) {
            box.textContent = `❌ ${data.error}`;
            box.style.color = 'red';
            statusInfo.textContent = '';
          } else {
            box.textContent = '❌ Failed to generate code';
            box.style.color = 'red';
            statusInfo.textContent = '';
          }
        } catch (err) {
          console.error(err);
          box.textContent = '❌ Error connecting to server.';
          box.style.color = 'red';
          statusInfo.textContent = 'Make sure the backend server is running.';
        } finally {
          // Re-enable button
          button.innerHTML = originalText;
          button.disabled = false;
        }
      }

      // 📋 Copy Code
      function copyCode() {
        const text = document.getElementById('paircode-box').textContent.trim();
        const box = document.getElementById('paircode-box');
        
        if (!text || text.includes('Your code') || text.includes('Please enter') || 
            text.includes('Generating') || text.includes('Error') || 
            text.includes('Failed') || text.includes('WhatsApp is already')) {
          return;
        }
        
        navigator.clipboard.writeText(text).then(() => {
          const originalColor = box.style.color;
          box.style.color = '#ffff00';
          box.textContent = '✅ Copied to clipboard!';
          
          setTimeout(() => {
            box.textContent = text;
            box.style.color = originalColor;
          }, 2000);
        }).catch(err => {
          console.error('Failed to copy: ', err);
          alert('❌ Failed to copy code to clipboard');
        });
      }

      // Initialize on page load
      window.addEventListener('load', async () => {
        try {
          const response = await fetch('https://wolfbot-pair-1.onrender.com/status');
          const status = await response.json();
          
          if (status.connected) {
            document.getElementById('paircode-box').textContent = '✅ WhatsApp is already connected!';
            document.getElementById('paircode-box').style.color = '#00ff88';
            stats.botStatus = 'Online';
            startUptimeCounter();
          }
          
          // Load initial stats
          fetchStats();
          
          // Set up auto-refresh every 10 seconds
          setInterval(fetchStats, 10000);
          
        } catch (error) {
          console.log('Server status check failed');
          // Use simulated stats
          simulateStats();
          setInterval(simulateStats, 15000);
        }
      });

      // Handle window resize for better responsiveness
      window.addEventListener('resize', () => {
        // Force reflow to ensure proper rendering
        document.body.style.display = 'none';
        document.body.offsetHeight; // Trigger reflow
        document.body.style.display = 'flex';
      });
    </script>
  </body>
</html>
