<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp QR Pairing | Silent Wolf</title>
    <!-- Load Poppins and QR Code library -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        color: #00ff99;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 0 0 15px #00ff88;
      }
      #session-input-container {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #session-id {
        padding: 8px 10px;
        border: 2px solid #00ff00;
        border-radius: 5px;
        background: #000;
        color: #00ff00;
        font-size: 1rem;
        width: 250px;
        margin-top: 5px;
      }
      #session-id:focus {
        outline: none;
        box-shadow: 0 0 10px #00ff00;
      }

      /* QR Container */
      #qr-container {
        margin-top: 30px;
        background: rgba(0, 255, 0, 0.08);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(0, 255, 0, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-width: 280px;
        min-height: 280px;
        margin: 10px 0;
      }

      /* Wrapper for the canvas to ensure proper fit */
      #qr-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 280px;
        aspect-ratio: 1 / 1;
      }

      /* Style for the QR code canvas */
      #qrCanvas {
        border-radius: 10px;
        border: 2px solid #00ff00;
        width: 100%;
        height: auto;
        max-width: 280px;
      }

      #loader {
        border: 4px solid rgba(0, 255, 0, 0.2);
        border-top: 4px solid #00ff00;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn {
        margin-top: 0px;
        padding: 10px 25px;
        border: 2px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
      }
      .btn:hover:not(:disabled) {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 25px #00ff00;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .back-btn {
        padding: 8px 20px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        color: #00ff00;
        text-decoration: none;
        transition: 0.3s;
        font-size: 0.9rem;
        margin-top: 15px;
      }
      .back-btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 15px #00ff00;
      }

      canvas#background {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      .status-info {
        margin-top: 10px;
        font-size: 0.9rem;
        opacity: 0.8;
        text-align: center;
      }

      .connected-status {
        color: #00ff88;
        font-weight: bold;
        margin-top: 10px;
        text-align: center;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.5rem;
        }
        #qr-wrapper {
          max-width: 220px;
        }
      }
      @media (max-width: 480px) {
        h1 {
          font-size: 1.2rem;
        }
        .btn,
        .back-btn {
          font-size: 0.85rem;
        }
        #qr-container {
          min-width: 200px;
          min-height: 200px;
        }
        #qr-wrapper {
          max-width: 200px;
        }
      }
    </style>
  </head>

  <body>
    <canvas id="background"></canvas>
    <h1>Generate WhatsApp QR Code</h1>

    <div id="session-input-container">
      <label for="session-id">Enter Session Name:</label>
      <input type="text" id="session-id" value="default" placeholder="e.g., whatsapp-bot-2" />
    </div>

    <div id="qr-container">
      <p style="opacity: 0.7;">Click below to generate QR</p>
    </div>

    <div id="status-info" class="status-info"></div>

    <button class="btn" onclick="generateQR()">⚡ Generate QR Code</button>
    <a href="/" class="back-btn">⬅ Back to Home</a>

    <script>
      // --- Background animation ---
      const canvas = document.getElementById('background');
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const particles = Array.from({ length: 100 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        dx: (Math.random() - 0.5) * 1,
        dy: (Math.random() - 0.5) * 1,
      }));

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff00';
        particles.forEach((p) => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();

      // --- QR Code logic ---
      const API_URL = 'http://localhost:5000';
      const container = document.getElementById('qr-container');
      const statusInfo = document.getElementById('status-info');
      const button = document.querySelector('.btn');
      const sessionIdInput = document.getElementById('session-id');
      let pollInterval = null;

      function stopPolling() {
        if (pollInterval) clearInterval(pollInterval);
      }

      function drawQR(qrString) {
        container.innerHTML = '<div id="qr-wrapper"><canvas id="qrCanvas"></canvas></div>';
        const canvasElement = document.getElementById('qrCanvas');

        const wrapperWidth = document.getElementById('qr-wrapper').offsetWidth;
        const qrSize = Math.min(wrapperWidth, 280); // dynamically fit QR inside the container

        QRCode.toCanvas(
          canvasElement,
          qrString,
          {
            width: qrSize,
            margin: 2,
            color: { dark: '#00ff00', light: '#000000' },
          },
          (error) => {
            if (error) console.error('QR Draw Error:', error);
          }
        );
      }

      async function fetchStatus(sessionId) {
        try {
          const response = await fetch(`${API_URL}/status/${sessionId}`);
          if (!response.ok) throw new Error(`Server error ${response.status}`);
          const data = await response.json();

          if (data.status === 'connected') {
            stopPolling();
            container.innerHTML = `<div class="connected-status">✅ WhatsApp session <b>${sessionId}</b> is connected!</div>`;
            statusInfo.textContent = `Session ${sessionId} is active.`;
            button.textContent = '⚡ Generate QR Code';
            button.disabled = false;
          } else if (data.status === 'qr' && data.qr) {
            drawQR(data.qr);
            statusInfo.textContent = `✅ QR generated for ${sessionId}. Scan it via WhatsApp → Linked Devices.`;
            button.textContent = '🔄 Polling...';
            button.disabled = true;
          } else if (['paircode', 'initializing', 'connecting'].includes(data.status)) {
            container.innerHTML = '<div id="loader"></div>';
            statusInfo.textContent = `🔄 Waiting... (${data.status})`;
          } else {
            stopPolling();
            container.innerHTML = `<p style="color:red;">❌ Session closed. Click Generate QR to restart.</p>`;
            statusInfo.textContent = `Session ${sessionId} inactive.`;
            button.textContent = '⚡ Generate QR Code';
            button.disabled = false;
          }
        } catch (error) {
          stopPolling();
          container.innerHTML = '<p style="color:red;">❌ Error connecting to server.</p>';
          statusInfo.textContent = 'Ensure backend is running on port 5000.';
          button.textContent = '⚡ Generate QR Code';
          button.disabled = false;
        }
      }

      async function generateQR() {
        const sessionId = sessionIdInput.value.trim() || 'default';
        stopPolling();
        container.innerHTML = '<div id="loader"></div>';
        statusInfo.textContent = `Initializing ${sessionId}...`;
        button.textContent = '⏳ Initializing...';
        button.disabled = true;

        try {
          const response = await fetch(`${API_URL}/generate-qr`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId }),
          });
          const data = await response.json();
          if (data.status === 'connected') fetchStatus(sessionId);
          else {
            pollInterval = setInterval(() => fetchStatus(sessionId), 5000);
            fetchStatus(sessionId);
          }
        } catch {
          container.innerHTML = '<p style="color:red;">❌ Failed to contact server API.</p>';
          statusInfo.textContent = 'Verify server on localhost:5000.';
          button.textContent = '⚡ Generate QR Code';
          button.disabled = false;
        }
      }

      window.addEventListener('load', async () => {
        const sessionId = sessionIdInput.value.trim() || 'default';
        try {
          const res = await fetch(`${API_URL}/status/${sessionId}`);
          const data = await res.json();
          if (data.status === 'connected') {
            container.innerHTML = `<div class="connected-status">✅ WhatsApp session <b>${sessionId}</b> is already connected!</div>`;
            statusInfo.textContent = `Session ${sessionId} active.`;
          } else {
            statusInfo.textContent = `Session ${sessionId} idle. Click Generate QR to begin.`;
          }
        } catch {
          statusInfo.textContent = `Server not reachable. Check backend.`;
        }
      });
    </script>
  </body>
</html>
