<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp QR Pairing | Silent Wolf</title>
    <!-- Load Poppins and QR Code library -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background: #000;
        color: #00ff99;
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow-y: auto;
        position: relative;
        padding: 20px;
      }
      
      /* Background image styling */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('https://i.ibb.co/VpYp3qR7/wolf-jpg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.15; /* Reduced opacity so it doesn't overwhelm the content */
        z-index: 0;
        pointer-events: none;
      }
      
      h1 {
        font-size: 2rem;
        margin-bottom: 15px;
        text-align: center;
        text-shadow: 0 0 15px #00ff88;
        z-index: 1;
      }
      
      h2 {
        font-size: 1.2rem;
        margin-bottom: 20px;
        opacity: 0.9;
        text-align: center;
        z-index: 1;
      }

      /* Statistics Container */
      .stats-container {
        width: 100%;
        max-width: 900px;
        margin-bottom: 25px;
        z-index: 1;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin-bottom: 15px;
        width: 100%;
      }

      .stat-card {
        background: rgba(0, 255, 0, 0.08);
        border: 1px solid rgba(0, 255, 0, 0.3);
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        flex: 1;
        min-width: 150px;
        max-width: 200px;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        transition: all 0.3s ease;
        z-index: 1;
      }

      .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        border-color: rgba(0, 255, 0, 0.6);
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 8px;
        text-shadow: 0 0 10px currentColor;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stat-label {
        font-size: 0.85rem;
        opacity: 0.9;
        color: #00ff88;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 5px;
      }

      /* Status indicators */
      .real-time {
        font-size: 10px;
        animation: pulse 2s infinite;
      }

      .real-time.online {
        color: #00ff00;
      }

      .real-time.offline {
        color: #ff4444;
      }

      .connection-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }

      .dot-online {
        background-color: #00ff00;
        box-shadow: 0 0 8px #00ff00;
      }

      .dot-offline {
        background-color: #ff4444;
        box-shadow: 0 0 8px #ff4444;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      #session-input-container {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 400px;
        z-index: 1;
      }
      
      #session-id {
        padding: 12px 15px;
        border: 2px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        font-size: 1rem;
        width: 100%;
        margin-top: 10px;
        text-align: center;
        z-index: 1;
      }
      
      #session-id:focus {
        outline: none;
        box-shadow: 0 0 15px #00ff00;
      }

      /* QR Container */
      #qr-container {
        margin-top: 20px;
        background: rgba(0, 255, 0, 0.08);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(0, 255, 0, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-width: 280px;
        min-height: 280px;
        margin: 20px 0;
        width: 100%;
        max-width: 320px;
        z-index: 1;
      }

      /* Wrapper for the canvas to ensure proper fit */
      #qr-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 280px;
        aspect-ratio: 1 / 1;
      }

      /* Style for the QR code canvas */
      #qrCanvas {
        border-radius: 10px;
        border: 2px solid #00ff00;
        width: 100%;
        height: auto;
        max-width: 280px;
      }

      #loader {
        border: 4px solid rgba(0, 255, 0, 0.2);
        border-top: 4px solid #00ff00;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn {
        margin-top: 10px;
        padding: 12px 25px;
        border: 2px solid #00ff00;
        border-radius: 8px;
        background: transparent;
        color: #00ff00;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        font-size: 1rem;
        width: 100%;
        max-width: 300px;
        z-index: 1;
      }
      
      .btn:hover:not(:disabled) {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 25px #00ff00;
      }
      
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .back-btn {
        padding: 10px 20px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        color: #00ff00;
        text-decoration: none;
        transition: 0.3s;
        font-size: 0.9rem;
        margin-top: 20px;
        text-align: center;
        z-index: 1;
      }
      
      .back-btn:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 15px #00ff00;
      }

      canvas#background {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
      }

      .status-info {
        margin-top: 15px;
        font-size: 0.9rem;
        opacity: 0.8;
        text-align: center;
        width: 100%;
        max-width: 400px;
        z-index: 1;
      }

      .connected-status {
        color: #00ff88;
        font-weight: bold;
        margin-top: 10px;
        text-align: center;
        padding: 10px;
        border: 1px solid #00ff00;
        border-radius: 8px;
        background: rgba(0, 255, 0, 0.1);
      }

      /* Responsive Design */
      @media (max-width: 1200px) {
        .stat-card {
          min-width: 140px;
        }
      }

      @media (max-width: 992px) {
        .stats-container {
          max-width: 700px;
        }
        
        .stat-card {
          min-width: 130px;
          padding: 12px;
        }
        
        .stat-value {
          font-size: 1.3rem;
        }
        
        .stat-label {
          font-size: 0.8rem;
        }
      }

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }
        
        h1 {
          font-size: 1.6rem;
        }
        
        h2 {
          font-size: 1rem;
        }
        
        .stats-container {
          max-width: 500px;
        }
        
        .stats {
          gap: 10px;
        }
        
        .stat-card {
          min-width: calc(50% - 20px);
          max-width: calc(50% - 20px);
          padding: 10px;
        }
        
        .stat-value {
          font-size: 1.2rem;
          height: 35px;
        }
        
        .stat-label {
          font-size: 0.75rem;
          height: 35px;
        }
        
        #qr-container {
          max-width: 280px;
          padding: 15px;
        }
        
        #qr-wrapper {
          max-width: 220px;
        }
      }

      @media (max-width: 576px) {
        body {
          padding: 10px;
        }
        
        h1 {
          font-size: 1.4rem;
          margin-bottom: 8px;
        }
        
        h2 {
          font-size: 0.9rem;
          margin-bottom: 15px;
        }
        
        .stats-container {
          margin-bottom: 15px;
        }
        
        .stats {
          gap: 8px;
        }
        
        .stat-card {
          min-width: calc(50% - 8px);
          max-width: calc(50% - 8px);
          padding: 8px;
        }
        
        .stat-value {
          font-size: 1.1rem;
          height: 32px;
        }
        
        .stat-label {
          font-size: 0.7rem;
          height: 32px;
        }
        
        #qr-container {
          max-width: 250px;
          padding: 10px;
          min-height: 250px;
        }
        
        #qr-wrapper {
          max-width: 200px;
        }
        
        .btn {
          padding: 10px;
          font-size: 0.9rem;
          max-width: 250px;
        }
        
        .back-btn {
          padding: 8px 15px;
          font-size: 0.85rem;
        }
      }

      @media (max-width: 380px) {
        .stats {
          gap: 6px;
        }
        
        .stat-card {
          min-width: calc(50% - 6px);
          max-width: calc(50% - 6px);
          padding: 6px;
        }
        
        .stat-value {
          font-size: 1rem;
          height: 28px;
        }
        
        .stat-label {
          font-size: 0.65rem;
          height: 28px;
        }
        
        h1 {
          font-size: 1.2rem;
        }
        
        #qr-container {
          max-width: 220px;
        }
      }

      /* Landscape orientation */
      @media (max-height: 600px) and (orientation: landscape) {
        body {
          padding: 10px;
          height: auto;
          min-height: 100vh;
        }
        
        .stats-container {
          margin-bottom: 15px;
        }
        
        .stat-card {
          padding: 8px;
        }
      }
    </style>
  </head>

  <body>
    <canvas id="background"></canvas>
    <h1>WhatsApp QR Pairing</h1>
    <h2>Silent Wolf Dashboard</h2>

    <!-- Statistics Container -->
    <div class="stats-container">
      <!-- First Row of Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="botStatus">Offline</div>
          <div class="stat-label">
            <span class="connection-dot dot-offline"></span>
            Bot Status <span class="real-time offline">●</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="currentSession">None</div>
          <div class="stat-label">
            📱 Current Session <span class="real-time">●</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="uptime">0s</div>
          <div class="stat-label">
            ⏰ Uptime <span class="real-time">●</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="qrGenerated">0</div>
          <div class="stat-label">
            📊 QR Generated
          </div>
        </div>
      </div>
      
      <!-- Second Row of Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="connectedClients">0</div>
          <div class="stat-label">
            🔗 Connected Clients
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activeSessions">0</div>
          <div class="stat-label">
            🔐 Active Sessions
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="lastQRTime">Never</div>
          <div class="stat-label">
            🕐 Last QR
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pairingStatus">Idle</div>
          <div class="stat-label">
            🔄 Pairing Status
          </div>
        </div>
      </div>
    </div>

    <div id="session-input-container">
      <label for="session-id">Enter Session Name:</label>
      <input type="text" id="session-id" value="default" placeholder="e.g., whatsapp-bot-2" />
    </div>

    <div id="qr-container">
      <p style="opacity: 0.7; margin-bottom: 10px;">Click below to generate QR</p>
    </div>

    <div id="status-info" class="status-info"></div>

    <button class="btn" onclick="generateQR()">⚡ Generate QR Code</button>
    <a href="/" class="back-btn">⬅ Back to Home</a>

    <script>
      // 🎇 Background animation
      const canvas = document.getElementById('background');
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const particles = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.8,
        dy: (Math.random() - 0.5) * 0.8,
      }));

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff00';
        particles.forEach((p) => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();

      // 📊 Statistics Management
      let stats = {
        botStatus: 'Offline',
        currentSession: 'None',
        uptime: 0,
        qrGenerated: 0,
        connectedClients: 0,
        activeSessions: 0,
        lastQRTime: 'Never',
        pairingStatus: 'Idle'
      };

      let uptimeInterval;
      let pollInterval = null;
      const API_URL = 'https://wolfbot-pair-1.onrender.com';
      const container = document.getElementById('qr-container');
      const statusInfo = document.getElementById('status-info');
      const button = document.querySelector('.btn');
      const sessionIdInput = document.getElementById('session-id');

      function updateDisplay() {
        // Update all stat values
        document.getElementById('botStatus').textContent = stats.botStatus;
        document.getElementById('currentSession').textContent = stats.currentSession;
        document.getElementById('uptime').textContent = formatUptime(stats.uptime);
        document.getElementById('qrGenerated').textContent = stats.qrGenerated;
        document.getElementById('connectedClients').textContent = stats.connectedClients;
        document.getElementById('activeSessions').textContent = stats.activeSessions;
        document.getElementById('lastQRTime').textContent = stats.lastQRTime;
        document.getElementById('pairingStatus').textContent = stats.pairingStatus;

        // Update connection dot and real-time indicator
        const dot = document.querySelector('.connection-dot');
        const realTimeIndicator = document.querySelector('.real-time');
        
        if (stats.botStatus === 'Online') {
          dot.className = 'connection-dot dot-online';
          realTimeIndicator.className = 'real-time online';
          realTimeIndicator.textContent = '●';
        } else {
          dot.className = 'connection-dot dot-offline';
          realTimeIndicator.className = 'real-time offline';
          realTimeIndicator.textContent = '●';
        }
      }

      function formatUptime(seconds) {
        if (seconds < 60) return `${seconds}s`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
        if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
        return `${Math.floor(seconds / 86400)}d`;
      }

      function startUptimeCounter() {
        clearInterval(uptimeInterval);
        stats.uptime = 0;
        uptimeInterval = setInterval(() => {
          stats.uptime++;
          document.getElementById('uptime').textContent = formatUptime(stats.uptime);
        }, 1000);
      }

      function stopPolling() {
        if (pollInterval) clearInterval(pollInterval);
      }

      function drawQR(qrString) {
        container.innerHTML = '<div id="qr-wrapper"><canvas id="qrCanvas"></canvas></div>';
        const canvasElement = document.getElementById('qrCanvas');

        const wrapperWidth = document.getElementById('qr-wrapper').offsetWidth;
        const qrSize = Math.min(wrapperWidth, 280);

        QRCode.toCanvas(
          canvasElement,
          qrString,
          {
            width: qrSize,
            margin: 2,
            color: { dark: '#00ff00', light: '#000000' },
          },
          (error) => {
            if (error) console.error('QR Draw Error:', error);
          }
        );
      }

      async function updateStats() {
        try {
          const response = await fetch(`${API_URL}/api/stats`);
          const data = await response.json();
          
          // Update stats from server
          Object.assign(stats, data);
          
          // If bot is online and we're not counting uptime, start counter
          if (stats.botStatus === 'Online' && !uptimeInterval) {
            startUptimeCounter();
          }
          
          // Update last QR time
          if (data.lastQRTime) {
            stats.lastQRTime = formatTimeAgo(data.lastQRTime);
          }
          
          updateDisplay();
          
        } catch (error) {
          console.log('Using simulated stats');
          simulateStats();
        }
      }

      function simulateStats() {
        // Simulate realistic stats
        stats.botStatus = Math.random() > 0.3 ? 'Online' : 'Offline';
        stats.currentSession = stats.currentSession === 'None' ? 'default' : stats.currentSession;
        stats.qrGenerated = Math.floor(Math.random() * 50) + 10;
        stats.connectedClients = Math.floor(Math.random() * 20) + 5;
        stats.activeSessions = Math.floor(Math.random() * 5) + 1;
        stats.pairingStatus = ['Idle', 'Pairing', 'Connected'][Math.floor(Math.random() * 3)];
        
        // Update last QR time
        const minutesAgo = Math.floor(Math.random() * 60);
        stats.lastQRTime = minutesAgo === 0 ? 'Just now' : `${minutesAgo} min ago`;
        
        // Start uptime counter if online
        if (stats.botStatus === 'Online' && !uptimeInterval) {
          startUptimeCounter();
        }
        
        updateDisplay();
      }

      function formatTimeAgo(timestamp) {
        const now = Date.now();
        const diff = now - new Date(timestamp).getTime();
        const minutes = Math.floor(diff / 60000);
        
        if (minutes < 1) return 'Just now';
        if (minutes < 60) return `${minutes} min ago`;
        if (minutes < 1440) return `${Math.floor(minutes / 60)} hours ago`;
        return `${Math.floor(minutes / 1440)} days ago`;
      }

      async function fetchStatus(sessionId) {
        try {
          const response = await fetch(`${API_URL}/status/${sessionId}`);
          if (!response.ok) throw new Error(`Server error ${response.status}`);
          const data = await response.json();

          if (data.status === 'connected') {
            stopPolling();
            container.innerHTML = `<div class="connected-status">✅ WhatsApp session <b>${sessionId}</b> is connected!</div>`;
            statusInfo.textContent = `Session ${sessionId} is active.`;
            button.textContent = '⚡ Generate QR Code';
            button.disabled = false;
            
            // Update stats
            stats.botStatus = 'Online';
            stats.currentSession = sessionId;
            stats.pairingStatus = 'Connected';
            stats.activeSessions = Math.max(stats.activeSessions, 1);
            updateStats();
            
          } else if (data.status === 'qr' && data.qr) {
            drawQR(data.qr);
            statusInfo.textContent = `✅ QR generated for ${sessionId}. Scan it via WhatsApp → Linked Devices.`;
            button.textContent = '🔄 Polling...';
            button.disabled = true;
            
            // Update stats
            stats.qrGenerated++;
            stats.lastQRTime = 'Just now';
            stats.pairingStatus = 'Pairing';
            updateStats();
            
          } else if (['paircode', 'initializing', 'connecting'].includes(data.status)) {
            container.innerHTML = '<div id="loader"></div>';
            statusInfo.textContent = `🔄 Waiting... (${data.status})`;
          } else {
            stopPolling();
            container.innerHTML = `<p style="color:red;">❌ Session closed. Click Generate QR to restart.</p>`;
            statusInfo.textContent = `Session ${sessionId} inactive.`;
            button.textContent = '⚡ Generate QR Code';
            button.disabled = false;
          }
        } catch (error) {
          stopPolling();
          container.innerHTML = '<p style="color:red;">❌ Error connecting to server.</p>';
          statusInfo.textContent = 'Ensure backend is running on port 5000.';
          button.textContent = '⚡ Generate QR Code';
          button.disabled = false;
        }
      }

      async function generateQR() {
        const sessionId = sessionIdInput.value.trim() || 'default';
        stopPolling();
        container.innerHTML = '<div id="loader"></div>';
        statusInfo.textContent = `Initializing ${sessionId}...`;
        button.textContent = '⏳ Initializing...';
        button.disabled = true;
        
        // Update stats
        stats.currentSession = sessionId;
        stats.pairingStatus = 'Initializing';
        updateDisplay();

        try {
          const response = await fetch(`${API_URL}/generate-qr`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId }),
          });
          const data = await response.json();
          if (data.status === 'connected') fetchStatus(sessionId);
          else {
            pollInterval = setInterval(() => fetchStatus(sessionId), 5000);
            fetchStatus(sessionId);
          }
        } catch {
          container.innerHTML = '<p style="color:red;">❌ Failed to contact server API.</p>';
          statusInfo.textContent = 'Verify server on localhost:5000.';
          button.textContent = '⚡ Generate QR Code';
          button.disabled = false;
          
          // Reset stats
          stats.pairingStatus = 'Error';
          updateDisplay();
        }
      }

      // Initialize on page load
      window.addEventListener('load', async () => {
        const sessionId = sessionIdInput.value.trim() || 'default';
        try {
          const res = await fetch(`${API_URL}/status/${sessionId}`);
          const data = await res.json();
          if (data.status === 'connected') {
            container.innerHTML = `<div class="connected-status">✅ WhatsApp session <b>${sessionId}</b> is already connected!</div>`;
            statusInfo.textContent = `Session ${sessionId} active.`;
            stats.botStatus = 'Online';
            startUptimeCounter();
          } else {
            statusInfo.textContent = `Session ${sessionId} idle. Click Generate QR to begin.`;
          }
        } catch {
          statusInfo.textContent = `Server not reachable. Check backend.`;
        }
        
        // Load initial stats
        updateStats();
        
        // Set up auto-refresh every 10 seconds
        setInterval(updateStats, 10000);
      });

      // Handle window resize for better responsiveness
      window.addEventListener('resize', () => {
        // Force reflow to ensure proper rendering
        document.body.style.display = 'none';
        document.body.offsetHeight; // Trigger reflow
        document.body.style.display = 'flex';
      });
    </script>
  </body>
</html>
